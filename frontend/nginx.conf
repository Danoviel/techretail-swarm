# ============================================================================
# TechRetail - Configuracion Nginx (distribuida via Docker Configs)
# ----------------------------------------------------------------------------
# - Sirve el index.html estatico
# - Hace proxy /api -> servicio "backend" (DNS interno de Swarm)
# - Swarm balancea automaticamente entre las replicas del backend
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging legible para diagnostico
    log_format custom '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      'rt=$request_time uct="$upstream_connect_time"';
    access_log /var/log/nginx/access.log custom;

    # Upstream apuntando al servicio backend.
    # "backend" es el nombre del service en docker-compose.yml.
    # Swarm lo resuelve via DNS interno y hace round-robin entre replicas.
    upstream backend_cluster {
        server backend:3000;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA: si no encuentra el archivo, sirve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy al backend - load balancing automatico de Swarm
        location /api {
            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Expone el hostname del container backend que respondio
            add_header X-Backend-Container $upstream_http_x_container_hostname;
        }

        # Healthcheck simple
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
