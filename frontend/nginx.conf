# ============================================================================
# TechRetail - Configuracion Nginx (distribuida via Docker Configs)
# ----------------------------------------------------------------------------
# Estrategia de balanceo:
# - El servicio "backend" usa endpoint_mode: dnsrr en Swarm. Cada query DNS
#   devuelve la IP de UNA replica distinta (round-robin a nivel DNS).
# - Aqui usamos el resolver DNS interno de Docker (127.0.0.11) con TTL bajo.
# - Usamos una variable en proxy_pass para forzar nuevo lookup en cada request
#   (sin variable, nginx cachea la IP solo en el inicio del worker).
# - Connection: close evita reuso de TCP, asegurando nueva conexion por request.
# ============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # DNS interno de Docker para resolver service names en runtime.
    # valid=5s -> nginx re-resuelve cada 5 segundos.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Logging legible para diagnostico (incluye el upstream que respondio)
    log_format custom '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent rt=$request_time '
                      'upstream=$upstream_addr';
    access_log /var/log/nginx/access.log custom;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA: si no encuentra el archivo, sirve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy al backend. La variable $backend obliga a nginx a hacer
        # DNS lookup en cada request (a traves del resolver), respetando
        # el round-robin DNSRR de Swarm.
        location /api {
            set $backend "backend";
            proxy_pass http://$backend:3000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cierra la conexion TCP despues de cada request -> sin keep-alive
            # entre nginx y backend, garantizando nueva resolucion DNS.
            proxy_set_header Connection close;

            # Expone el hostname del container backend que respondio
            add_header X-Backend-Container $upstream_http_x_container_hostname;
            add_header X-Upstream-Addr $upstream_addr;
        }

        # Healthcheck simple
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
